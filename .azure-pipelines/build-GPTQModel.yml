trigger: none
pr: none

parameters:
  - name: version
    type: string
    default: "v5.7.0"

variables:
  TORCH_VERSION: "2.10.0"
  PYTHON_VERSIONS: "3.10 3.11 3.12 3.13"

stages:
  - stage: BuildWheels
    displayName: "Build CUDA Wheels"
    jobs:
      - job: BuildMatrix
        displayName: "Build Matrix"
        strategy:
          matrix:
            # CUDA_12_6:
            #   CUDA_VERSION: "12.6"
            #   TORCH_INDEX: "https://download.pytorch.org/whl/cu126"
            #   IMAGE_VERSION: "nvidia/cuda:12.6.1-devel-ubuntu24.04"
            # CUDA_12_8:
            #   CUDA_VERSION: "12.8"
            #   TORCH_INDEX: "https://download.pytorch.org/whl/cu128"
            #   IMAGE_VERSION: "nvidia/cuda:12.8.1-devel-ubuntu24.04"
            CUDA_13_0:
              CUDA_VERSION: "13.0"
              TORCH_INDEX: "https://download.pytorch.org/whl/cu130"
              IMAGE_VERSION: "nvidia/cuda:13.0.2-devel-ubuntu24.04"

        pool:
          vmImage: "ubuntu-latest"

        steps:
          - checkout: self
            displayName: "Checkout Code"

          - script: |
              echo "Starting Docker run for $(IMAGE_VERSION)..."
              
              docker run --rm \
                -u root \
                -v $(System.DefaultWorkingDirectory):/workspace \
                -w /workspace \
                -e TARGET_VERSION="${{ parameters.version }}" \
                -e CUDA_VERSION="$(CUDA_VERSION)" \
                -e TORCH_VERSION="$(TORCH_VERSION)" \
                -e TORCH_INDEX="$(TORCH_INDEX)" \
                -e PYTHON_VERSIONS="$(PYTHON_VERSIONS)" \
                -e HOST_UID="$(id -u)" \
                -e HOST_GID="$(id -g)" \
                $(IMAGE_VERSION) \
                bash build_wheels.sh
                
            displayName: "Build Matrix in Docker Run"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/output_wheels"
              artifactName: "wheels-$(CUDA_VERSION)"
            displayName: "Publish Wheel Artifacts"

  - stage: PublishToFeed
    displayName: "Publish to Azure Artifacts Feed"
    dependsOn: BuildWheels
    condition: succeeded()
    jobs:
      - job: Upload
        displayName: "Upload to PyPI Feed"
        pool:
          vmImage: "ubuntu-latest"

        steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: "current"
              downloadType: "all"
              downloadPath: "$(System.ArtifactsDirectory)"
            displayName: "Download All Wheels"

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/wheels
              # 将所有构建好的 CUDA 版本的 wheels 汇聚到一个目录
              find $(System.ArtifactsDirectory) -name "*.whl" -type f -exec cp {} $(Build.ArtifactStagingDirectory)/wheels/ \;
              ls -la $(Build.ArtifactStagingDirectory)/wheels/
            displayName: "Collect All Wheels"

          - task: TwineAuthenticate@1
            inputs:
              artifactFeed: "$(System.TeamProject)/gptqmodel-wheels"

          - script: |
              pip install twine
              twine upload $(Build.ArtifactStagingDirectory)/wheels/* \
                --skip-existing \
                --verbose
            displayName: "Upload to Azure Artifacts Feed"
            env:
              TWINE_USERNAME: "$(TWINE_USERNAME)"
              TWINE_PASSWORD: "$(TWINE_PASSWORD)"
              TWINE_REPOSITORY_URL: "$(TWINE_REPOSITORY_URL)"